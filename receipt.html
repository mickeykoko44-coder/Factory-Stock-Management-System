<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ระบบออกบิลเงินสด</title>
<style>
*{box-sizing:border-box}
body{font-family:Tahoma,Arial,sans-serif;margin:0;background:#f4f4f5;color:#111827}
header{background:#111827;color:white;padding:18px 24px}
h1{margin:0;font-size:24px}
.wrap{display:grid;grid-template-columns:1.2fr .8fr;gap:20px;padding:20px;max-width:1300px;margin:auto}
.panel{background:white;border-radius:14px;padding:18px;box-shadow:0 8px 25px #0001}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0}
button{border:0;border-radius:10px;padding:10px 14px;cursor:pointer;font-weight:700}
.primary{background:#111827;color:white}.secondary{background:#e5e7eb}.danger{background:#fee2e2;color:#991b1b}.success{background:#16a34a;color:white}
input,textarea,select{width:100%;border:1px solid #d1d5db;border-radius:8px;padding:8px;font-family:inherit}
.item-grid{display:grid;grid-template-columns:2fr .8fr .8fr .8fr;gap:8px;align-items:center;margin-bottom:8px}
.head{font-weight:700;color:#374151}
.items{max-height:64vh;overflow:auto;padding-right:6px}
.receipt{width:360px;max-width:100%;margin:auto;background:white;padding:18px;font-family:'Courier New',monospace;font-size:13px;color:#111}
.center{text-align:center}.muted{color:#555}
.rrow{display:grid;grid-template-columns:1fr 68px;text-align:left;gap:6px}.rrow .amt{text-align:right}
.line{border-top:1px dashed #222;margin:10px 0}.total{font-weight:700;font-size:15px}.small{font-size:12px}.receipt-title{font-weight:700;font-size:15px}
.settings{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}.full{grid-column:1/-1}
.message{padding:10px;border-radius:10px;background:#fee2e2;color:#991b1b;display:none;margin:10px 0}
.message.ok{display:block;background:#dcfce7;color:#166534}.message.error{display:block}
@media(max-width:900px){.wrap{grid-template-columns:1fr}.receipt{width:100%}.item-grid{grid-template-columns:1.4fr .7fr .7fr .7fr;font-size:13px}}
@media print{body{background:white}header,.input-panel,.toolbar,.no-print,.message{display:none!important}.wrap{display:block;padding:0}.panel{box-shadow:none;padding:0}.receipt{width:80mm;margin:0;padding:6mm}.preview-panel{padding:0}@page{size:80mm auto;margin:0}}
</style>
</head>
<body>
<header><h1>ระบบออกบิลเงินสด</h1></header>
<div class="wrap">
<section class="panel input-panel">
<h2>กรอก/แก้ไขรายการสินค้า</h2>
<div id="msg" class="message"></div>
<div class="settings">
<label>ชื่อร้าน / หัวบิล<input id="shopName" value="บริษัท เซาท์นุ๊ดเดิ้ลฟู้ดส์ จำกัด (สำนักงานใหญ่)"></label>
<label>เบอร์โทรบริษัท<input id="companyPhone" value="062-995-4065"></label>
<label class="full">ที่อยู่<textarea id="address" rows="2">15 ซอยวินอุทิศ ต.คอหงส์ อ.หาดใหญ่ จ.สงขลา 90110</textarea></label>
<label>เลขที่บิล<input id="billNo" value=""></label>
<label>ชื่อลูกค้า<input id="customer" value="ลูกค้า"></label>
<label>เบอร์โทรลูกค้า<input id="customerPhone" value=""></label>
<label>ส่วนลด<input id="discount" type="number" min="0" value="0"></label>
<label>รับเงินสด<input id="cash" type="number" min="0" value="0"></label>
</div>

<div class="toolbar">
<button class="primary" onclick="renderReceipt()">คำนวณ/ออกบิล</button>
<button class="secondary" onclick="saveData()">บันทึกข้อมูลในเครื่อง</button>
<button class="secondary" onclick="window.print()">Save เป็น PDF / พิมพ์</button>
<button class="danger" onclick="clearQty()">ล้างจำนวน</button>
</div>

<div class="item-grid head"><div>สินค้า</div><div>ราคา/หน่วย</div><div>จำนวน</div><div>รวม</div></div>
<div id="items" class="items"></div>
<div class="toolbar">
<button class="secondary" onclick="addCustomItem()">+ เพิ่มสินค้าเอง</button>
<button class="success" onclick="copyReceiptText()">Copy รายละเอียดบิล</button>
</div>
</section>

<section class="panel preview-panel">
<h2 class="no-print">ตัวอย่างบิล</h2>
<div id="receipt" class="receipt"></div>
</section>
</div>

<script>
// ใส่ Google Apps Script Web App URL ตัวเดียวกับ index.html
const API_URL = "https://script.google.com/macros/s/AKfycbydUWXnHXhCijc6Y2fFXr_XAiqGGly21MXW2txyXWaa_dGK5rKPfSVhUo2OobdZ7AKl/exec";

let items = [];
let productOptions = [];

function params(){return new URLSearchParams(location.search)}
function money(n){return Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}
function todayThai(){const d=new Date();return d.toLocaleDateString('th-TH',{day:'2-digit',month:'2-digit',year:'numeric'})}
function showMsg(text,type='error'){const el=document.getElementById('msg');el.textContent=text;el.className='message '+type}
async function api(action,payload={}){if(API_URL.includes('PASTE_YOUR'))throw new Error('ยังไม่ได้ใส่ API_URL ใน receipt.html');const res=await fetch(API_URL,{method:'POST',body:JSON.stringify({action,...payload})});return await res.json()}

async function loadInitialData(){
  document.getElementById('billNo').value = 'CSH' + Date.now().toString().slice(-10);
  const source=params().get('source') || 'manual';
  const orderId=params().get('orderId') || '';
  const referenceId=params().get('referenceId') || params().get('saleRef') || params().get('id') || '';

  try{
    const r=await api('getReceiptData',{source,orderId,referenceId});
    if(!r.success) throw new Error(r.error);
    productOptions = r.products || [];
    items = (r.items || []).map(x=>({name:x.name,price:Number(x.price||0),qty:Number(x.qty||0)}));

    if(r.order){
      document.getElementById('billNo').value = r.order.order_id || document.getElementById('billNo').value;
      document.getElementById('customer').value = r.order.customer_name || 'ลูกค้า';
      document.getElementById('customerPhone').value = r.order.phone || '';
    }
    showMsg('โหลดข้อมูลสำเร็จ','ok');
  }catch(e){
    showMsg(e.message || 'โหลดข้อมูลไม่สำเร็จ');
    items = JSON.parse(localStorage.getItem('receiptItems') || 'null') || [];
  }

  if(items.length===0){
    items = [{name:'สินค้าใหม่',price:0,qty:0}];
  }
  drawItems();
  renderReceipt();
}

function productSelectHtml(i,it){
  const opts = productOptions.map(p=>`<option value="${p.name}" data-price="${p.price}" ${p.name===it.name?'selected':''}>${p.name}</option>`).join('');
  return `<select onchange="selectProduct(${i},this)"><option value="${it.name}">${it.name}</option>${opts}</select>`;
}
function selectProduct(i,sel){
  const opt=sel.options[sel.selectedIndex];
  items[i].name=sel.value;
  const price=Number(opt.dataset.price||items[i].price||0);
  items[i].price=price;
  renderReceipt();
}
function drawItems(){
  const box=document.getElementById('items');box.innerHTML='';
  items.forEach((it,i)=>{
    const div=document.createElement('div');div.className='item-grid';
    div.innerHTML=`
      <input value="${it.name}" onchange="items[${i}].name=this.value;renderReceipt()" list="productList">
      <input type="number" min="0" value="${it.price}" onchange="items[${i}].price=Number(this.value);renderReceipt()">
      <input type="number" min="0" value="${it.qty}" onchange="items[${i}].qty=Number(this.value);renderReceipt()">
      <div>${money((it.price||0)*(it.qty||0))}</div>`;
    box.appendChild(div);
  });
  if(!document.getElementById('productList')){
    const dl=document.createElement('datalist');dl.id='productList';
    dl.innerHTML=productOptions.map(p=>`<option value="${p.name}"></option>`).join('');
    document.body.appendChild(dl);
  }
}
function renderReceipt(){
  drawItems();
  const sold=items.filter(it=>Number(it.qty)>0);
  const sub=sold.reduce((s,it)=>s+Number(it.price)*Number(it.qty),0);
  const discount=Number(document.getElementById('discount').value||0);
  const grand=Math.max(0,sub-discount);
  const cash=Number(document.getElementById('cash').value||0);
  const change=Math.max(0,cash-grand);
  const lines=sold.map(it=>`<div class="rrow"><div>${it.name}<br><span class="small">${it.qty} X @${money(it.price)}</span></div><div class="amt">${money(it.qty*it.price)}</div></div>`).join('');
  document.getElementById('receipt').innerHTML=`
    <div class="center receipt-title">Delivery Order / Receipt (Cash)</div>
    <div class="center small">TAXID : 0905562004277<br>POSID : ONLINE</div><br>
    <div class="center small">${document.getElementById('address').value.replace(/\n/g,'<br>')}<br>Tel.${document.getElementById('companyPhone').value}</div>
    <div class="line"></div>
    <div class="rrow small"><div>${document.getElementById('billNo').value}<br>${document.getElementById('customer').value}<br>${document.getElementById('customerPhone').value}</div><div class="amt">${todayThai()}</div></div>
    <div class="line"></div>
    <div class="rrow small"><div>Description</div><div class="amt">Amount</div></div>
    ${lines || '<div class="center muted">ยังไม่มีรายการสินค้า</div>'}
    <div class="line"></div>
    <div class="rrow total"><div>รวมเงิน / Total</div><div class="amt">${money(sub)}</div></div>
    <div class="rrow"><div>ส่วนลด / Discount</div><div class="amt">${money(discount)}</div></div>
    <div class="rrow total"><div>รวมทั้งสิ้น / Grand Total</div><div class="amt">${money(grand)}</div></div>
    <div class="rrow"><div>Cash</div><div class="amt">${money(cash)}</div></div>
    <div class="rrow"><div>Change</div><div class="amt">${money(change)}</div></div>
    <br><div class="center">...THANK YOU...</div><br>
    <div class="small">Cashier : supervisor</div>`;
}
function saveData(){localStorage.setItem('receiptItems',JSON.stringify(items));showMsg('บันทึกข้อมูลในเครื่องแล้ว','ok')}
function clearQty(){items.forEach(it=>it.qty=0);renderReceipt()}
function addCustomItem(){items.push({name:'สินค้าใหม่',price:0,qty:0});renderReceipt()}
async function copyReceiptText(){
  const text=document.getElementById('receipt').innerText;
  try{await navigator.clipboard.writeText(text);showMsg('Copy รายละเอียดบิลแล้ว','ok')}catch(e){showMsg('Copy ไม่สำเร็จ')}
}
document.querySelectorAll('input,textarea').forEach(el=>el.addEventListener('input',renderReceipt));
loadInitialData();
</script>
</body>
</html>
