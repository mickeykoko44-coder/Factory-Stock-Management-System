<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Secure receipt page. Login or authorized access required." />
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet" />
<meta name="googlebot" content="noindex,nofollow,noarchive,nosnippet" />
<meta property="og:type" content="website" />
<meta property="og:title" content="Factory Receipt System" />
<meta property="og:description" content="Secure receipt page. Authorized access required." />
<meta property="og:site_name" content="Factory Stock Management System" />

<title>ระบบออกบิลเงินสด</title>
<style>
*{box-sizing:border-box}
body{font-family:Tahoma,Arial,sans-serif;margin:0;background:#f4f4f5;color:#111827}
header{background:#111827;color:white;padding:18px 24px}
h1{margin:0;font-size:24px}
.wrap{display:grid;grid-template-columns:1.2fr .8fr;gap:20px;padding:20px;max-width:1300px;margin:auto}
.panel{background:white;border-radius:14px;padding:18px;box-shadow:0 8px 25px #0001}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin:12px 0}
button{border:0;border-radius:10px;padding:10px 14px;cursor:pointer;font-weight:700}
.primary{background:#111827;color:white}.secondary{background:#e5e7eb}.danger{background:#fee2e2;color:#991b1b}.success{background:#16a34a;color:white}
input,textarea,select{width:100%;border:1px solid #d1d5db;border-radius:8px;padding:8px;font-family:inherit}
.item-grid{display:grid;grid-template-columns:2fr .8fr .8fr .8fr;gap:8px;align-items:center;margin-bottom:8px}
.head{font-weight:700;color:#374151}
.items{max-height:64vh;overflow:auto;padding-right:6px}
.receipt{width:360px;max-width:100%;margin:auto;background:white;padding:18px;font-family:'Courier New',monospace;font-size:13px;color:#111}
.center{text-align:center}.muted{color:#555}
.rrow{display:grid;grid-template-columns:1fr 68px;text-align:left;gap:6px}.rrow .amt{text-align:right}
.line{border-top:1px dashed #222;margin:10px 0}.total{font-weight:700;font-size:15px}.small{font-size:12px}.receipt-title{font-weight:700;font-size:15px}
.settings{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}.full{grid-column:1/-1}
.message{padding:10px;border-radius:10px;background:#fee2e2;color:#991b1b;display:none;margin:10px 0}
.message.ok{display:block;background:#dcfce7;color:#166534}.message.error{display:block}
@media(max-width:900px){.wrap{grid-template-columns:1fr}.receipt{width:100%}.item-grid{grid-template-columns:1.4fr .7fr .7fr .7fr;font-size:13px}}
@media print{body{background:white}header,.input-panel,.toolbar,.no-print,.message{display:none!important}.wrap{display:block;padding:0}.panel{box-shadow:none;padding:0}.receipt{width:80mm;margin:0;padding:6mm}.preview-panel{padding:0}@page{size:80mm auto;margin:0}}

.bottom-actions{
  margin-top:22px;
  border-top:1px solid #e5e7eb;
  padding-top:14px;
}
.button-row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:10px;
}
.button-row button{min-width:160px}
button:disabled{opacity:.55;cursor:not-allowed}
.loading-note{
  display:none;
  margin-top:10px;
  color:#2563eb;
  font-weight:700;
}
.loading-note.active{display:block}
@media print{
  html,body{
    width:80mm!important;
    margin:0!important;
    padding:0!important;
    background:white!important;
  }
  body *{visibility:hidden!important}
  #receipt,#receipt *{visibility:visible!important}
  #receipt{
    position:absolute!important;
    left:0!important;
    top:0!important;
    width:80mm!important;
    max-width:80mm!important;
    margin:0!important;
    padding:6mm!important;
    box-shadow:none!important;
    background:white!important;
  }
  header,.input-panel,.toolbar,.bottom-actions,.no-print,.message,.preview-panel h2{display:none!important}
  .wrap,.panel,.preview-panel{
    display:block!important;
    width:80mm!important;
    max-width:80mm!important;
    margin:0!important;
    padding:0!important;
    box-shadow:none!important;
    border:0!important;
    background:white!important;
  }
  @page{
    size:80mm auto;
    margin:0;
  }
}


.item-actions{
  margin:18px 0 12px 0;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
}
.btn-add,
.btn-pdf,
.btn-copy{
  background:#f3f4f6;
  color:#111827;
  border:1px solid #d1d5db;
}
.btn-add:hover,
.btn-pdf:hover,
.btn-copy:hover:hover{
  background:#e5e7eb;
}
.btn-clear{
  background:#ef4444;
  color:white;
  border:1px solid #dc2626;
}
button.btn-clear:hover{
  background:#dc2626;
}

</style>
</head>
<body>
<header><h1>ระบบออกบิลเงินสด</h1></header>
<div class="wrap">
<section class="panel input-panel">
<h2>กรอก/แก้ไขรายการสินค้า</h2>
<div id="msg" class="message"></div>
<div class="settings">
<label>ชื่อร้าน / หัวบิล<input id="shopName" value="บริษัท เซาท์นุ๊ดเดิ้ลฟู้ดส์ จำกัด (สำนักงานใหญ่)"></label>
<label>เบอร์โทรบริษัท<input id="companyPhone" value="062-995-4065"></label>
<label class="full">ที่อยู่<textarea id="address" rows="2">15 ซอยวินอุทิศ ต.คอหงส์ อ.หาดใหญ่ จ.สงขลา 90110</textarea></label>
<label>เลขที่บิล<input id="billNo" value=""></label>
<label>ชื่อลูกค้า<input id="customer" value="ลูกค้า"></label>
<label>เบอร์โทรลูกค้า<input id="customerPhone" value=""></label>
<label>ส่วนลด<input id="discount" type="number" min="0" value="0"></label>
<label>รับเงินสด<input id="cash" type="number" min="0" value="0"></label>
</div>


<div class="item-actions no-print">
  <button class="btn-add" onclick="runButtonAction(this, addCustomItem)">+ เพิ่มสินค้า</button>
  <button class="btn-clear" onclick="runButtonAction(this, clearQty)">ล้างจำนวน</button>
</div>

<div class="item-grid head"><div>สินค้า</div><div>ราคา/หน่วย</div><div>จำนวน</div><div>รวม</div></div>
<div id="items" class="items"></div>
<div class="bottom-actions no-print">
  <div class="button-row">
    <button class="btn-pdf" onclick="runButtonAction(this, printReceipt)">พิมพ์บิล</button>
    <button class="btn-pdf" onclick="runButtonAction(this, saveReceiptPdf)">บันทึก PDF</button>
    <button class="btn-copy" onclick="runButtonAction(this, saveReceiptImage)">บันทึก PNG</button>
    <button class="btn-copy" onclick="runButtonAction(this, copyReceiptImage)">Copy รูป PNG</button>
    <button class="btn-copy" onclick="runButtonAction(this, copyReceiptText)">Copy รายละเอียดบิล</button>
    <button class="secondary" onclick="goBackToIndex()">กลับหน้าหลัก</button>
  </div>
  <div id="loadingNote" class="loading-note">กำลังทำรายการ...</div>
</div>
</section>

<section class="panel preview-panel">
<h2 class="no-print">ตัวอย่างบิล</h2>
<div id="receipt" class="receipt"></div>
</section>
</div>

<script>
// ใส่ Google Apps Script Web App URL ตัวเดียวกับ index.html
const API_URL = "https://script.google.com/macros/s/AKfycbxFXIk1zhCQbyshK2aR6g-8HAlpo55r_0Crac4d7oVNLL6KYfzWmhD_HIP0IsTPJ3-sQw/exec";

let items = [];
let productOptions = [];

function params(){return new URLSearchParams(location.search)}
function money(n){return Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}
function todayThai(){const d=new Date();return d.toLocaleDateString('th-TH',{day:'2-digit',month:'2-digit',year:'numeric'})}
function showMsg(text,type='error'){const el=document.getElementById('msg');el.textContent=text;el.className='message '+type}
async function api(action,payload={}){
  if(API_URL.includes('PASTE_YOUR')) throw new Error('ยังไม่ได้ใส่ API_URL ใน receipt.html');
  try{
    const res=await fetch(API_URL,{
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({action,...payload})
    });
    const text=await res.text();
    if(!res.ok) throw new Error(`HTTP ${res.status}: ${text.slice(0,220)}`);
    try{
      return JSON.parse(text);
    }catch(parseError){
      throw new Error('API ไม่ได้ตอบกลับเป็น JSON: '+text.slice(0,220));
    }
  }catch(e){
    throw new Error(`เชื่อมต่อ API ไม่ได้ (${action}): ${e.message || e}`);
  }
}

function setAllButtonsDisabled(disabled, activeBtn=null){
  document.querySelectorAll('button').forEach(btn=>{
    btn.disabled=disabled;
  });
  if(activeBtn && disabled){
    activeBtn.dataset.oldText=activeBtn.textContent;
    activeBtn.textContent='กำลังโหลด...';
  }
  if(activeBtn && !disabled && activeBtn.dataset.oldText){
    activeBtn.textContent=activeBtn.dataset.oldText;
    delete activeBtn.dataset.oldText;
  }
  const note=document.getElementById('loadingNote');
  if(note) note.classList.toggle('active', disabled);
}

async function runButtonAction(btn, action){
  if(btn.disabled) return;
  setAllButtonsDisabled(true, btn);
  try{
    await Promise.resolve(action());
  }catch(e){
    console.error(e);
    showMsg(e.message || 'ทำรายการไม่สำเร็จ');
  }finally{
    setTimeout(()=>setAllButtonsDisabled(false, btn), 900);
  }
}

function printReceipt(){
  renderReceipt();
  window.print();
}



async function loadInitialData(){
  document.getElementById('billNo').value = 'CSH' + Date.now().toString().slice(-10);
  const source=params().get('source') || 'manual';
  const orderId=params().get('orderId') || '';

  try{
    const r=await api('getReceiptData',{source,orderId});
    if(!r.success) throw new Error(r.error);
    productOptions = r.products || [];
    items = (r.items || []).map(x=>({name:x.name,price:Number(x.price||0),qty:Number(x.qty||0)}));

    if(r.order){
      document.getElementById('billNo').value = r.order.order_id || document.getElementById('billNo').value;
      document.getElementById('customer').value = r.order.customer_name || 'ลูกค้า';
      document.getElementById('customerPhone').value = r.order.phone || '';
    }
    showMsg('โหลดข้อมูลสำเร็จ','ok');
  }catch(e){
    showMsg(e.message || 'โหลดข้อมูลไม่สำเร็จ');
    items = JSON.parse(localStorage.getItem('receiptItems') || 'null') || [];
  }

  if(items.length===0){
    items = [{name:'สินค้าใหม่',price:0,qty:0}];
  }
  drawItems();
  renderReceipt();
}

function productSelectHtml(i,it){
  const opts = productOptions.map(p=>`<option value="${p.name}" data-price="${p.price}" ${p.name===it.name?'selected':''}>${p.name}</option>`).join('');
  return `<select onchange="selectProduct(${i},this)"><option value="${it.name}">${it.name}</option>${opts}</select>`;
}
function selectProduct(i,sel){
  const opt=sel.options[sel.selectedIndex];
  items[i].name=sel.value;
  const price=Number(opt.dataset.price||items[i].price||0);
  items[i].price=price;
  renderReceipt();
}
function drawItems(){
  const box=document.getElementById('items');box.innerHTML='';
  items.forEach((it,i)=>{
    const div=document.createElement('div');div.className='item-grid';
    div.innerHTML=`
      <input value="${it.name}" onchange="items[${i}].name=this.value;renderReceipt()" list="productList">
      <input type="number" min="0" value="${it.price}" onchange="items[${i}].price=Number(this.value);renderReceipt()">
      <input type="number" min="0" value="${it.qty}" onchange="items[${i}].qty=Number(this.value);renderReceipt()">
      <div>${money((it.price||0)*(it.qty||0))}</div>`;
    box.appendChild(div);
  });
  if(!document.getElementById('productList')){
    const dl=document.createElement('datalist');dl.id='productList';
    dl.innerHTML=productOptions.map(p=>`<option value="${p.name}"></option>`).join('');
    document.body.appendChild(dl);
  }
}
function renderReceipt(){
  drawItems();
  const sold=items.filter(it=>Number(it.qty)>0);
  const sub=sold.reduce((s,it)=>s+Number(it.price)*Number(it.qty),0);
  const discount=Number(document.getElementById('discount').value||0);
  const grand=Math.max(0,sub-discount);
  const cash=Number(document.getElementById('cash').value||0);
  const change=Math.max(0,cash-grand);
  const lines=sold.map(it=>`<div class="rrow"><div>${it.name}<br><span class="small">${it.qty} X @${money(it.price)}</span></div><div class="amt">${money(it.qty*it.price)}</div></div>`).join('');
  document.getElementById('receipt').innerHTML=`
    <div class="center receipt-title">Delivery Order / Receipt (Cash)</div>
    <div class="center small">TAXID : 0905562004277<br>POSID : ONLINE</div><br>
    <div class="center small">${document.getElementById('address').value.replace(/\n/g,'<br>')}<br>Tel.${document.getElementById('companyPhone').value}</div>
    <div class="line"></div>
    <div class="rrow small"><div>${document.getElementById('billNo').value}<br>${document.getElementById('customer').value}<br>${document.getElementById('customerPhone').value}</div><div class="amt">${todayThai()}</div></div>
    <div class="line"></div>
    <div class="rrow small"><div>Description</div><div class="amt">Amount</div></div>
    ${lines || '<div class="center muted">ยังไม่มีรายการสินค้า</div>'}
    <div class="line"></div>
    <div class="rrow total"><div>รวมเงิน / Total</div><div class="amt">${money(sub)}</div></div>
    <div class="rrow"><div>ส่วนลด / Discount</div><div class="amt">${money(discount)}</div></div>
    <div class="rrow total"><div>รวมทั้งสิ้น / Grand Total</div><div class="amt">${money(grand)}</div></div>
    <div class="rrow"><div>Cash</div><div class="amt">${money(cash)}</div></div>
    <div class="rrow"><div>Change</div><div class="amt">${money(change)}</div></div>
    <br><div class="center">...THANK YOU...</div><br>
    <div class="small">Cashier : supervisor</div>`;
}
function saveData(){localStorage.setItem('receiptItems',JSON.stringify(items));showMsg('บันทึกข้อมูลในเครื่องแล้ว','ok')}
function clearQty(){items.forEach(it=>it.qty=0);renderReceipt()}
function addCustomItem(){items.push({name:'สินค้าใหม่',price:0,qty:0});renderReceipt()}

function wrapCanvasText(ctx,text,maxWidth){
  const words=String(text||'').split(/\s+/);
  const lines=[];
  let line='';
  words.forEach(word=>{
    const test=line?line+' '+word:word;
    if(ctx.measureText(test).width>maxWidth && line){
      lines.push(line);
      line=word;
    }else{
      line=test;
    }
  });
  if(line)lines.push(line);
  return lines.length?lines:[''];
}

function drawReceiptLine(ctx,text,x,y,maxWidth,lineHeight,align='left'){
  const oldAlign=ctx.textAlign;
  ctx.textAlign=align;
  wrapCanvasText(ctx,text,maxWidth).forEach((line,idx)=>ctx.fillText(line,x,y+(idx*lineHeight)));
  ctx.textAlign=oldAlign;
  return y+(wrapCanvasText(ctx,text,maxWidth).length*lineHeight);
}

function buildReceiptCanvas(){
  renderReceipt();
  const sold=items.filter(it=>Number(it.qty)>0);
  const sub=sold.reduce((s,it)=>s+Number(it.price)*Number(it.qty),0);
  const discount=Number(document.getElementById('discount').value||0);
  const grand=Math.max(0,sub-discount);
  const cash=Number(document.getElementById('cash').value||0);
  const change=Math.max(0,cash-grand);
  const scale=2;
  const width=720;
  const left=44;
  const right=width-44;
  const rowH=34;
  const baseHeight=520;
  const estimatedLines=sold.reduce((sum,it)=>sum+Math.max(1,Math.ceil(String(it.name||'').length/24)),0);
  const height=Math.max(baseHeight,420+(estimatedLines*rowH)+(sold.length*28));
  const canvas=document.createElement('canvas');
  canvas.width=width*scale;
  canvas.height=height*scale;
  canvas.style.width=width+'px';
  canvas.style.height=height+'px';
  const ctx=canvas.getContext('2d');
  ctx.scale(scale,scale);
  ctx.fillStyle='white';
  ctx.fillRect(0,0,width,height);
  ctx.fillStyle='#111';
  ctx.strokeStyle='#111';
  ctx.lineWidth=1;

  let y=36;
  ctx.textAlign='center';
  ctx.font='bold 20px Courier New, monospace';
  ctx.fillText('Delivery Order / Receipt (Cash)',width/2,y);
  y+=24;
  ctx.font='13px Courier New, monospace';
  ctx.fillText('TAXID : 0905562004277',width/2,y);
  y+=18;
  ctx.fillText('POSID : ONLINE',width/2,y);
  y+=26;

  ctx.font='13px Courier New, monospace';
  const address=String(document.getElementById('address').value||'').split('\n').filter(Boolean);
  address.forEach(line=>{y=drawReceiptLine(ctx,line,width/2,y,width-100,18,'center');});
  ctx.fillText('Tel.'+document.getElementById('companyPhone').value,width/2,y);
  y+=22;

  ctx.beginPath();ctx.setLineDash([6,5]);ctx.moveTo(left,y);ctx.lineTo(right,y);ctx.stroke();ctx.setLineDash([]);
  y+=24;
  ctx.textAlign='left';
  ctx.font='13px Courier New, monospace';
  ctx.fillText(document.getElementById('billNo').value||'',left,y);
  ctx.textAlign='right';
  ctx.fillText(todayThai(),right,y);
  y+=18;
  ctx.textAlign='left';
  y=drawReceiptLine(ctx,document.getElementById('customer').value||'',left,y,360,18,'left');
  y=drawReceiptLine(ctx,document.getElementById('customerPhone').value||'',left,y,360,18,'left');
  y+=8;

  ctx.beginPath();ctx.setLineDash([6,5]);ctx.moveTo(left,y);ctx.lineTo(right,y);ctx.stroke();ctx.setLineDash([]);
  y+=24;
  ctx.font='bold 13px Courier New, monospace';
  ctx.textAlign='left';ctx.fillText('Description',left,y);
  ctx.textAlign='right';ctx.fillText('Amount',right,y);
  y+=18;

  ctx.font='13px Courier New, monospace';
  if(!sold.length){
    ctx.textAlign='center';
    ctx.fillText('ยังไม่มีรายการสินค้า',width/2,y);
    y+=rowH;
  }else{
    sold.forEach(it=>{
      const amount=Number(it.price||0)*Number(it.qty||0);
      ctx.textAlign='left';
      const nameLines=wrapCanvasText(ctx,it.name,left+405);
      nameLines.forEach((line,idx)=>ctx.fillText(line,left,y+(idx*18)));
      ctx.textAlign='right';
      ctx.fillText(money(amount),right,y);
      y+=nameLines.length*18;
      ctx.textAlign='left';
      ctx.fillStyle='#555';
      ctx.fillText(`${it.qty} X @${money(it.price)}`,left,y);
      ctx.fillStyle='#111';
      y+=24;
    });
  }

  ctx.beginPath();ctx.setLineDash([6,5]);ctx.moveTo(left,y);ctx.lineTo(right,y);ctx.stroke();ctx.setLineDash([]);
  y+=24;
  const summary=(label,value,bold=false)=>{
    ctx.font=(bold?'bold ':'')+'14px Courier New, monospace';
    ctx.textAlign='left';ctx.fillText(label,left,y);
    ctx.textAlign='right';ctx.fillText(money(value),right,y);
    y+=22;
  };
  summary('รวมเงิน / Total',sub,true);
  summary('ส่วนลด / Discount',discount);
  summary('รวมทั้งสิ้น / Grand Total',grand,true);
  summary('Cash',cash);
  summary('Change',change);
  y+=18;
  ctx.font='bold 15px Courier New, monospace';
  ctx.textAlign='center';ctx.fillText('...THANK YOU...',width/2,y);
  y+=28;
  ctx.font='13px Courier New, monospace';
  ctx.textAlign='left';ctx.fillText('Cashier : supervisor',left,y);
  return canvas;
}

async function saveReceiptImage(){
  const canvas=await buildReceiptCanvas();
  const a=document.createElement('a');
  a.download=(document.getElementById('billNo').value || 'receipt')+'.png';
  a.href=canvas.toDataURL('image/png');
  a.click();
  showMsg('บันทึกรูป PNG แล้ว','ok');
}

async function copyReceiptImage(){
  const canvas=await buildReceiptCanvas();
  if(!navigator.clipboard || !window.ClipboardItem){
    throw new Error('browser นี้ไม่รองรับ Copy รูป ให้ใช้ บันทึก PNG แทน');
  }
  const blob=await new Promise(resolve=>canvas.toBlob(resolve,'image/png'));
  if(!blob)throw new Error('สร้าง PNG สำหรับ copy ไม่สำเร็จ');
  await navigator.clipboard.write([new ClipboardItem({'image/png':blob})]);
  showMsg('Copy รูป PNG แล้ว','ok');
}

function bytesToBinaryString(bytes){
  let out='';
  for(let i=0;i<bytes.length;i++)out+=String.fromCharCode(bytes[i]);
  return out;
}

function pdfEscape(text){
  return String(text).replace(/[\\()]/g,'\\$&');
}

async function saveReceiptPdf(){
  const canvas=await buildReceiptCanvas();
  const jpgDataUrl=canvas.toDataURL('image/jpeg',0.95);
  const jpgBytes=Uint8Array.from(atob(jpgDataUrl.split(',')[1]),c=>c.charCodeAt(0));
  const pageWidth=226.77;
  const pageHeight=Math.max(320,pageWidth*(canvas.height/canvas.width));
  const imageName='Im1';
  const objects=[
    '<< /Type /Catalog /Pages 2 0 R >>',
    '<< /Type /Pages /Kids [3 0 R] /Count 1 >>',
    `<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${pageWidth.toFixed(2)} ${pageHeight.toFixed(2)}] /Resources << /XObject << /${imageName} 4 0 R >> >> /Contents 5 0 R >>`,
    `<< /Type /XObject /Subtype /Image /Width ${canvas.width} /Height ${canvas.height} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${jpgBytes.length} >>\nstream\n${bytesToBinaryString(jpgBytes)}\nendstream`,
    `<< /Length ${(`q\n${pageWidth.toFixed(2)} 0 0 ${pageHeight.toFixed(2)} 0 0 cm\n/${imageName} Do\nQ`).length} >>\nstream\nq\n${pageWidth.toFixed(2)} 0 0 ${pageHeight.toFixed(2)} 0 0 cm\n/${imageName} Do\nQ\nendstream`,
    `<< /Title (${pdfEscape(document.getElementById('billNo').value || 'receipt')}) /Creator (Factory Receipt 1.0.8) >>`
  ];
  let pdf='%PDF-1.4\n';
  const offsets=[0];
  objects.forEach((obj,i)=>{
    offsets.push(pdf.length);
    pdf+=`${i+1} 0 obj\n${obj}\nendobj\n`;
  });
  const xref=pdf.length;
  pdf+=`xref\n0 ${objects.length+1}\n0000000000 65535 f \n`;
  for(let i=1;i<offsets.length;i++)pdf+=String(offsets[i]).padStart(10,'0')+' 00000 n \n';
  pdf+=`trailer\n<< /Size ${objects.length+1} /Root 1 0 R /Info 6 0 R >>\nstartxref\n${xref}\n%%EOF`;
  const bytes=new Uint8Array(pdf.length);
  for(let i=0;i<pdf.length;i++)bytes[i]=pdf.charCodeAt(i)&255;
  const blob=new Blob([bytes],{type:'application/pdf'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.download=(document.getElementById('billNo').value || 'receipt')+'.pdf';
  a.href=url;
  a.click();
  setTimeout(()=>URL.revokeObjectURL(url),2000);
  showMsg('บันทึก PDF แล้ว','ok');
}

async function copyReceiptText(){
  const text=document.getElementById('receipt').innerText;
  try{await navigator.clipboard.writeText(text);showMsg('Copy รายละเอียดบิลแล้ว','ok')}catch(e){showMsg('Copy ไม่สำเร็จ')}
}
function goBackToIndex(){
  const target=location.origin+location.pathname.replace(/\/[^\/]*$/,'/')+'index.html';
  if(history.length>1)history.back();
  else location.href=target;
}
document.querySelectorAll('input,textarea').forEach(el=>el.addEventListener('input',renderReceipt));
loadInitialData();
</script>
