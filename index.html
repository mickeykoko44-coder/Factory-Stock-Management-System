<title>Factory Stock Management System</title>
<style>
*{box-sizing:border-box;font-family:Arial,sans-serif}
body{margin:0;background:#f4f6f8;color:#1f2937}
header{background:linear-gradient(135deg,#111827,#2563eb);color:white;padding:24px;text-align:center}
.container{max-width:1280px;margin:24px auto;padding:0 16px}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
button{border:0;border-radius:10px;padding:10px 14px;background:#2563eb;color:#fff;font-weight:700;cursor:pointer}
button:hover{background:#1d4ed8}
button:disabled{background:#9ca3af!important;cursor:not-allowed!important;opacity:.78}
.tab-btn{background:#6b7280}.tab-btn.active{background:#2563eb}
.danger{background:#dc2626}.secondary{background:#0f766e}.warning{background:#d97706}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;margin-bottom:18px}
.card{background:#fff;border-radius:16px;padding:18px;box-shadow:0 4px 14px rgba(0,0,0,.08);margin-bottom:16px}
.page{display:none}.page.active{display:block}
label{display:block;margin-top:12px;font-weight:700}
input,select,textarea{width:100%;padding:10px;margin-top:6px;border:1px solid #d1d5db;border-radius:10px;font-size:15px}
table{width:100%;border-collapse:collapse;margin-top:12px;background:#fff}
th,td{padding:10px;border-bottom:1px solid #e5e7eb;text-align:left;vertical-align:middle}
th{background:#e5e7eb;position:sticky;top:0;z-index:1}
.table-wrap{overflow:auto;max-height:520px;border-radius:12px;border:1px solid #e5e7eb}
.summary-box{font-size:24px;font-weight:800;color:#2563eb}
.message{margin-top:12px;padding:12px;border-radius:10px;display:none}
.message.ok{display:block;background:#dcfce7;color:#166534}
.message.error{display:block;background:#fee2e2;color:#991b1b}
.hint{color:#6b7280;font-size:14px}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:end}.row>div{flex:1;min-width:220px}
.hidden{display:none!important}.low-stock{color:#dc2626;font-weight:800}
.center-toast{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);background:#16a34a;color:white;padding:24px 36px;border-radius:18px;box-shadow:0 16px 48px rgba(0,0,0,.28);font-size:24px;font-weight:900;z-index:9999;text-align:center;min-width:280px;animation:pop .2s ease-out}
.center-toast.error{background:#dc2626}.center-toast .small{font-size:14px;font-weight:500;margin-top:8px}
@keyframes pop{from{opacity:0;transform:translate(-50%,-45%) scale(.92)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
.chart-wrap{overflow:auto;border:1px solid #e5e7eb;border-radius:12px;padding:12px;background:#fff}
canvas.analytics-chart{width:100%;max-width:860px;height:420px;background:white}
.receipt-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:18px 0}
.receipt-paper{max-width:620px;margin:0 auto;background:#fff;padding:24px;box-shadow:0 4px 18px rgba(0,0,0,.15);color:#111;font-size:14px;line-height:1.35}
.receipt-center{text-align:center}.receipt-title{font-size:22px;font-weight:800;margin-bottom:10px}.receipt-divider{border-top:1px dashed #111;margin:10px 0}
.receipt-meta{display:flex;justify-content:space-between;gap:12px}.receipt-table{width:100%;border-collapse:collapse;margin-top:8px}.receipt-table th,.receipt-table td{border:0;padding:5px 0;vertical-align:top}.receipt-table th{background:#fff;border-bottom:1px dashed #111}.receipt-table td:nth-child(2),.receipt-table th:nth-child(2){text-align:center;width:80px}.receipt-table td:nth-child(3),.receipt-table th:nth-child(3){text-align:right;width:120px}.receipt-item-detail{margin-left:24px;color:#333;font-size:13px}.receipt-summary{margin-top:10px;border-top:1px dashed #111;padding-top:8px}.receipt-summary-row{display:flex;justify-content:space-between;margin:4px 0}.receipt-grand{font-size:18px;font-weight:800}
@media print{header,.tabs,.no-print,footer{display:none!important}.page{display:none!important}#analytics{display:block!important}.card{box-shadow:none;border:1px solid #ddd;break-inside:avoid}.receipt-actions{display:none!important}}

.order-preview-modal{
  position:fixed;inset:0;background:rgba(15,23,42,.65);z-index:10000;
  display:flex;align-items:center;justify-content:center;padding:20px;
}
.order-preview-box{background:white;border-radius:18px;max-width:760px;width:100%;max-height:92vh;overflow:auto;padding:18px;box-shadow:0 24px 80px rgba(0,0,0,.35)}
.order-preview-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:12px 0}
.order-image-canvas{display:block;max-width:100%;margin:0 auto;border:1px solid #e5e7eb;border-radius:10px;background:white}
.price-edit-input{max-width:120px}
.owner-only-note{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;padding:10px;border-radius:10px;margin:8px 0}


button{margin:8px 8px 8px 0}
.tabs button{margin:4px}
#loginApp button,#publicOrderApp button,#dashboard button,#products button,#production button,#sales button,#retail button{margin-top:14px}
#orders .table-wrap{max-height:none;overflow-x:auto;overflow-y:visible}
#ordersTable td,#ordersTable th{white-space:normal}
.order-action-buttons{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.order-items-preview{line-height:1.55}
.order-toggle{background:#6b7280;padding:6px 10px;margin-top:8px}
.bar-row{display:grid;grid-template-columns:minmax(180px,1.4fr) 3fr minmax(120px,.8fr);gap:12px;align-items:center;margin:10px 0}
.bar-track{background:#e5e7eb;height:22px;border-radius:999px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,#2563eb,#06b6d4);border-radius:999px;min-width:2px}
.bar-fill.product{background:linear-gradient(90deg,#16a34a,#84cc16)}
.bar-name{font-weight:700;overflow:hidden;text-overflow:ellipsis}
.bar-value{text-align:right;font-weight:800;color:#334155}


.allowed-products-box{
  margin-top:14px;
  padding:14px;
  border:1px solid #e5e7eb;
  border-radius:12px;
  background:#f9fafb;
}
.allowed-products-box label{
  margin-top:4px;
  padding:6px 8px;
  background:white;
  border-radius:8px;
  border:1px solid #e5e7eb;
}
.sale-items-space,.retail-items-space{
  margin-top:18px;
}
#saleItems input,#retailItems input{margin-bottom:0}


.customer-order-products{margin-top:20px}
.customer-order-phone-gap{margin-bottom:18px}
.customer-order-warning{
  margin:14px 0 16px;
  padding:12px 14px;
  border:1px solid #f59e0b;
  border-left:6px solid #d97706;
  border-radius:10px;
  background:#fffbeb;
  color:#92400e;
  font-weight:800;
}
.order-filter-bar{margin:14px 0 10px}
.version-badge{margin-top:12px;color:#6b7280;font-size:14px;text-align:center}

</style>

function ensureAdminMarkup(){
  const el=document.getElementById('adminApp');
  if(!el || el.dataset.loaded==='true')return;
  const bytes=Uint8Array.from(atob(ADMIN_APP_HTML_B64),c=>c.charCodeAt(0));
  el.innerHTML=new TextDecoder().decode(bytes);
  el.dataset.loaded='true';
}

function today(){return new Date().toISOString().split('T')[0]}
function tomorrow(){const d=new Date();d.setDate(d.getDate()+1);return d.toISOString().split('T')[0]}
function yesterday(){const d=new Date();d.setDate(d.getDate()-1);return d.toISOString().split('T')[0]}
function nowText(){return new Date().toLocaleString('th-TH')}
function dateOnlyText(v){
  try{
    let d;
    if(!v){
      d=new Date();
    }else if(typeof v==='string' && /^\d{4}-\d{2}-\d{2}$/.test(v)){
      d=new Date(v+'T00:00:00');
    }else{
      d=new Date(v);
    }

    if(isNaN(d.getTime())) return '';

    return d.toLocaleDateString('th-TH',{
      day:'2-digit',
      month:'2-digit',
      year:'numeric'
    });

  }catch(e){
    return '';
  }
}
function money(n){return Number(n||0).toLocaleString('th-TH',{minimumFractionDigits:2,maximumFractionDigits:2})}
function toNonNegativeNumber(v){const n=Number(v||0);return Number.isFinite(n)&&n>0?n:0}
function safe(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function showMessage(id,text,type){const el=document.getElementById(id);if(!el)return;el.textContent=text;el.className='message '+type}
function showCenterSuccess(text='ทำสำเร็จ',sub=''){const old=document.querySelector('.center-toast');if(old)old.remove();const box=document.createElement('div');box.className='center-toast';box.innerHTML=`<div>${safe(text)}</div>${sub?`<div class="small">${safe(sub)}</div>`:''}`;document.body.appendChild(box);setTimeout(()=>box.remove(),1600)}
function showCenterError(text='เกิดข้อผิดพลาด',sub=''){const old=document.querySelector('.center-toast');if(old)old.remove();const box=document.createElement('div');box.className='center-toast error';box.innerHTML=`<div>${safe(text)}</div>${sub?`<div class="small">${safe(sub)}</div>`:''}`;document.body.appendChild(box);setTimeout(()=>box.remove(),2400)}
async function oneTimeClick(btn,fn){if(btn.dataset.locked==='true')return;btn.dataset.locked='true';btn.disabled=true;const old=btn.textContent;btn.textContent='กำลังทำรายการ...';try{await fn();}catch(e){showCenterError('ทำรายการไม่สำเร็จ',e.message||'');btn.disabled=false;btn.dataset.locked='false';btn.textContent=old;return;}setTimeout(()=>{if(document.body.contains(btn)){btn.disabled=false;btn.dataset.locked='false';btn.textContent=old}},1600)}
async function api(action,payload={}){
  if(API_URL.includes('PASTE_YOUR')) throw new Error('ยังไม่ได้ใส่ API_URL ใน index.html');
  try{
    const res=await fetch(API_URL,{
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({action,...payload})
    });
    const text=await res.text();
    if(!res.ok) throw new Error(`HTTP ${res.status}: ${text.slice(0,220)}`);
    try{
      return JSON.parse(text);
    }catch(parseError){
      throw new Error('API ไม่ได้ตอบกลับเป็น JSON: '+text.slice(0,220));
    }
  }catch(e){
    throw new Error(`เชื่อมต่อ API ไม่ได้ (${action}): ${e.message || e}`);
  }
}

function normalizeLoginUsername(value){const v=String(value||'').trim();return /^c\d+$/i.test(v)?v.toUpperCase():v}
function setupHeader(){
  if(state.user?.role==='customer'){
    document.getElementById('mainTitle').textContent=state.user?.displayName||state.user?.username||'ร้านค้า';
    document.getElementById('mainSubtitle').textContent='';
  }else{
    document.getElementById('mainTitle').textContent='Factory Stock Management System';
    document.getElementById('mainSubtitle').textContent=`Role: ${state.user?.role||''} | ${state.user?.displayName||state.user?.username||''}`;
  }
}
function showPage(id,btn){document.querySelectorAll('#adminApp .page').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));document.getElementById(id).classList.add('active');if(btn)btn.classList.add('active');if(id==='analytics')renderAnalytics();if(id==='retail')renderRetailItems();if(id==='stockMovement')renderStockMovements();if(id==='loginLogs')loadLoginLogs();}
function renderTabs(){
  const role=state.user.role;
  let tabs=[];
  if(role==='owner')tabs=[['dashboard','Dashboard'],['stockMovement','ประวัติสต๊อก'],['products','รายการสินค้า'],['customers','ลูกค้า'],['production','ผลิตเข้า'],['sales','ขายออก'],['retail','ขายปลีก'],['orders','Orders'],['loginLogs','Login Logs'],['analytics','Analytics']];
  if(role==='admin')tabs=[['stockMovement','ประวัติสต๊อก'],['products','รายการสินค้า'],['production','ผลิตเข้า'],['sales','ขายออก'],['retail','ขายปลีก'],['orders','Orders']];
  document.getElementById('roleTabs').innerHTML=tabs.map((t,i)=>`<button class="tab-btn ${i===0?'active':''}" onclick="showPage('${t[0]}',this)">${t[1]}</button>`).join('')+`<button class="danger" onclick="logout()">Logout</button>`;
  document.querySelectorAll('#adminApp .page').forEach(p=>p.classList.remove('active'));
  document.getElementById(tabs[0]?.[0]||'products').classList.add('active');
}
async function login(){try{const username=normalizeLoginUsername(document.getElementById('loginUser').value);const password=document.getElementById('loginPass').value;const r=await api('login',{username,password,pageUrl:location.href,userAgent:navigator.userAgent});if(!r.success)return showMessage('loginMessage',r.error,'error');state.user=r.user;localStorage.setItem('factory_user',JSON.stringify(r.user));if(r.user.role==='owner'||r.user.role==='admin'){ensureAdminMarkup();document.getElementById('loginApp').classList.add('hidden');document.getElementById('adminApp').classList.remove('hidden');setupHeader();renderTabs();await loadAllData();}else{document.getElementById('loginApp').classList.add('hidden');document.getElementById('publicOrderApp').classList.remove('hidden');setupHeader();await loadAllData();renderCustomerOrder();}}catch(e){showMessage('loginMessage',e.message,'error')}}
function logout(){localStorage.removeItem('factory_user');location.reload()}
async function loadAllData(){
  const r=await api('getAllData',{username:state.user?.username});
  if(!r.success)throw new Error(r.error);
  Object.assign(state,r);
  if(state.user?.role==='owner'){
    await loadLoginLogs(false);
    renderAll();
  }else if(state.user?.role==='admin'){
    renderAll();
  }
}
function renderAll(){renderDashboard();renderStockMovements();renderProducts();renderCustomers();renderDropdowns();renderOrders();renderAllowedProductCheckboxes();renderSaleItems();renderRetailItems();renderLoginLogs();}
function renderDashboard(){if(!document.getElementById('stockTable'))return;document.getElementById('totalProducts').textContent=state.products.length;document.getElementById('totalCustomers').textContent=state.customers.filter(c=>c.customer_id!=='RETAIL').length;document.getElementById('pendingOrders').textContent=[...new Set(state.orders.filter(o=>o.status==='pending').map(o=>o.order_id))].length;let total=0;const rows=state.products.map(p=>{const q=toNonNegativeNumber(state.stock[p.product_id]);const price=toNonNegativeNumber(p.price);const v=q*price;total+=v;return `<tr><td>${safe(p.product_id)}</td><td>${safe(p.product_name)}</td><td class="${q<=0?'low-stock':''}">${q.toFixed(2)}</td><td>${safe(p.unit)}</td><td>${money(price)}</td><td>${money(v)}</td></tr>`}).join('');document.getElementById('totalValue').textContent=money(total)+' บาท';document.getElementById('stockTable').innerHTML=rows||'<tr><td colspan="6">ไม่มีข้อมูล</td></tr>';}

function normalizeDateText(v){
  if(!v)return '';
  try{
    const d=new Date(v);
    if(!isNaN(d.getTime())) return d.toLocaleString('th-TH');
  }catch(e){}
  return String(v);
}
function renderStockMovements(){
  const tbody=document.getElementById('stockMovementTable');
  if(!tbody)return;
  let rows=[...(state.stockMovements||[])];
  const q=(document.getElementById('movementSearch')?.value||'').toLowerCase();
  const type=document.getElementById('movementTypeFilter')?.value||'';
  const limit=Number(document.getElementById('movementLimit')?.value||50);
  rows=rows.filter(r=>{
    const text=[r.product_id,r.product_name,r.source,r.reference_id,r.user,r.note].join(' ').toLowerCase();
    return (!q || text.includes(q)) && (!type || String(r.movement_type)===type);
  });
  rows.sort((a,b)=>String(b.timestamp||'').localeCompare(String(a.timestamp||'')));
  rows=rows.slice(0,limit);
  tbody.innerHTML=rows.map(r=>{
    const delta=Number(r.change_qty||0);
    const cls=delta<0?'low-stock':'';
    const sign=delta>0?'+':'';
    return `<tr><td>${safe(normalizeDateText(r.timestamp))}</td><td>${safe(normalizeDateText(r.date))}</td><td>${safe(r.product_id)}</td><td>${safe(r.product_name)}</td><td class="${cls}">${sign}${delta.toFixed(2)}</td><td>${Number(r.stock_before||0).toFixed(2)}</td><td><b>${Number(r.stock_after||0).toFixed(2)}</b></td><td>${safe(r.movement_type)}</td><td>${safe(r.source)}</td><td>${safe(r.reference_id)}</td><td>${safe(r.user)}</td><td>${safe(r.note)}</td></tr>`;
  }).join('') || '<tr><td colspan="12">ยังไม่มีประวัติการเปลี่ยนสต๊อก</td></tr>';
}

async function loadLoginLogs(showToast=true){
  if(state.user?.role!=='owner')return;
  const r=await api('getLoginLogs',{username:state.user.username});
  if(!r.success){
    showMessage('loginLogsMessage',r.error||'โหลด Login Logs ไม่สำเร็จ','error');
    return;
  }
  state.loginLogs=r.loginLogs||[];
  state.loginLogAccounts=r.accounts||[...new Set(state.loginLogs.map(x=>x.username).filter(Boolean))].sort();
  renderLoginLogFilter();
  renderLoginLogs();
  if(showToast)showCenterSuccess('โหลด Login Logs แล้ว');
}

function renderLoginLogFilter(){
  const el=document.getElementById('loginLogAccountFilter');
  if(!el)return;

function formatDeliveryDate(v){

}
function formatOrderDateTime(v){
  if(!v)return '';
  try{
    const d=new Date(v);
    if(!isNaN(d.getTime())) return d.toLocaleString('th-TH',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});
  }catch(e){}
  return String(v);
}
function groupOrders(){const map={};state.orders.forEach(o=>{if(!map[o.order_id])map[o.order_id]={...o,items:[],sum:0};map[o.order_id].items.push(o);map[o.order_id].sum+=Number(o.total||0)});return Object.values(map).sort((a,b)=>String(b.timestamp).localeCompare(String(a.timestamp)));}
function ensureOrderFilters(){
  const card=document.querySelector('#orders .card');
  if(!card||document.getElementById('orderStatusFilter'))return;
  const bar=document.createElement('div');
  bar.className='row order-filter-bar no-print';
  bar.innerHTML=`<div><label>Filter Status</label><select id="orderStatusFilter" onchange="renderOrders()"><option value="">ทั้งหมด</option><option value="approved">Approved</option><option value="pending">ยังไม่จัดส่ง / Pending</option><option value="finished">จัดส่งแล้ว</option><option value="rejected">Not Approved</option></select></div><div><label>Filter Date</label><select id="orderDateFilter" onchange="renderOrders()"><option value="">ทั้งหมด</option><option value="today">วันนี้</option><option value="week">หนึ่งสัปดาห์</option><option value="year">หนึ่งปี</option></select></div>`;
  const tableWrap=card.querySelector('.table-wrap');
  if(tableWrap)card.insertBefore(bar,tableWrap);else card.appendChild(bar);
}
function orderTimestampMs(o){
  const raw=o.timestamp||o.date||'';
  const d=new Date(raw);
  return isNaN(d.getTime())?0:d.getTime();
}
function orderDateInRange(o,range){
  if(!range)return true;
  const ms=orderTimestampMs(o);
  if(!ms)return true;
  const now=new Date();
  const start=new Date(now.getFullYear(),now.getMonth(),now.getDate()).getTime();
  if(range==='today')return ms>=start;
  const days=range==='week'?7:365;
  return ms>=Date.now()-(days*24*60*60*1000);
}
function filteredOrderGroups(){
  const status=document.getElementById('orderStatusFilter')?.value||'';
  const dateRange=document.getElementById('orderDateFilter')?.value||'';
  return groupOrders().filter(o=>(!status||String(o.status)===status)&&orderDateInRange(o,dateRange));
}

  return `<div class="order-items-preview">${lines}${more}</div>`;
}
function renderOrders(){

      actions=`<div class="order-action-buttons"><button disabled>กำลังทำรายการ...</button><button class="danger" disabled>Not Approve</button></div>`;

    }else if(o.status==='finished'){
      actions=`<div class="order-action-buttons"><button onclick="previewOrderImage('${safe(o.order_id)}')">พิมพ์รูป</button><button class="secondary" onclick="openReceiptForOrder('${safe(o.order_id)}')">สร้างบิลเงินสด</button></div>`;
    }
    return `<tr><td>${safe(o.order_id)}</td><td>${safe(o.customer_name)}</td><td>${safe(formatOrderDateTime(o.timestamp||''))}</td><td>${safe(o.delivery_date ? formatDeliveryDate(o.delivery_date) : '-')}</td><td>${safe(o.ordered_by||'')}</td><td>${safe(o.phone||'')}</td><td>${itemList}</td><td>${safe(o.status)}</td><td>${actions}</td></tr>`;
  }).join('');
  document.getElementById('ordersTable').innerHTML=rows||'<tr><td colspan="9">ไม่มี order</td></tr>';

async function approveOrder(orderId){
  processingOrderId=orderId;renderOrders();
  try{
    const orderRows=state.orders.filter(o=>o.order_id===orderId);
    const shortages=[];
    for(const item of orderRows){
      const available=toNonNegativeNumber(state.stock[item.product_id]);
      const qty=Number(item.quantity||0);
      if(qty>available){
        const p=state.products.find(x=>x.product_id===item.product_id);
        shortages.push({name:p?.product_name||item.product_id,requested:qty,available});
      }
    }
    const allowShortage=shortages.length>0;
    if(allowShortage){
      const detail=shortages.map(x=>`- ${x.name}: สั่ง ${x.requested} / คงเหลือ ${x.available}`).join('\n');
      const ok=confirm(`ของในคลังไม่เพียงพอสำหรับรายการนี้\n\n${detail}\n\nถ้ายืนยัน ระบบจะอนุมัติรายการและตั้งสต็อกสินค้าที่ไม่พอให้เหลือ 0 แทนการติดลบ\n\nยืนยัน Approve ต่อหรือไม่?`);
      if(!ok){
        showMessage('orderMessage','ยกเลิกการ Approve เพราะสต็อกไม่เพียงพอ','error');
        return;
      }
    }
    const r=await api('approveOrder',{username:state.user.username,orderId,allowShortage});
    if(!r.success)return showMessage('orderMessage',r.error,'error');
    showMessage('orderMessage','Approve แล้ว และตัด stock ใน SalesOut','ok');
    showCenterSuccess('ทำสำเร็จ','Approve order แล้ว');
    await loadAllData();
  }catch(e){showMessage('orderMessage',e.message,'error');showCenterError('ทำรายการไม่สำเร็จ',e.message)}
  finally{processingOrderId=null;renderOrders();}
}async function rejectOrder(orderId){
  if(processingOrderId)return;
  const ok=confirm('ยืนยัน Not Approve order นี้หรือไม่?');
  if(!ok)return;
  processingOrderId=orderId;renderOrders();
  try{
    const r=await api('rejectOrder',{username:state.user.username,orderId});
    if(!r.success)return showMessage('orderMessage',r.error,'error');
    showMessage('orderMessage','Not Approve order แล้ว','ok');
    showCenterSuccess('ทำสำเร็จ','Not Approve order แล้ว');
    await loadAllData();
  }catch(e){showMessage('orderMessage',e.message,'error');showCenterError('ทำรายการไม่สำเร็จ',e.message)}
  finally{processingOrderId=null;renderOrders();}
}

async function submitOrder(){try{const items=[...document.querySelectorAll('.orderQty')].map(i=>({product_id:i.dataset.product,quantity:Number(i.value||0)})).filter(x=>x.quantity>0);if(items.length===0)return showMessage('orderSubmitMessage','กรุณาใส่จำนวนสินค้าอย่างน้อย 1 รายการ','error');const r=await api('submitOrder',{customer_id:state.user.customer_id,delivery_date:document.getElementById('orderDatePicker').value,form_sent_date:document.getElementById('formSentDate').value,ordered_by:document.getElementById('orderedBy').value,phone:document.getElementById('phone').value,items});if(!r.success)return showMessage('orderSubmitMessage',r.error,'error');showMessage('orderSubmitMessage','ส่งคำสั่งซื้อสำเร็จ เลขที่ '+r.order_id,'ok');showCenterSuccess('ส่งออเดอร์สำเร็จ','เลขที่ '+r.order_id);document.querySelectorAll('.orderQty').forEach(i=>{i.value='';i.disabled=false});clearCustomerOrderPreview();}catch(e){showMessage('orderSubmitMessage',e.message,'error');showCenterError('ส่งออเดอร์ไม่สำเร็จ',e.message)}}
function currentWeekValue(){
  const d=new Date();
  d.setHours(0,0,0,0);
  d.setDate(d.getDate()+3-((d.getDay()+6)%7));
  const week1=new Date(d.getFullYear(),0,4);
  const week=Math.ceil((((d-week1)/86400000)+1)/7);
  return d.getFullYear()+'-W'+String(week).padStart(2,'0');
}
function ensureAnalyticsControls(){
  const mode=document.getElementById('analyticsMode');
  if(!mode)return;
  if(![...mode.options].some(o=>o.value==='week')){
    const opt=document.createElement('option');
    opt.value='week';
    opt.textContent='รายสัปดาห์';
    mode.insertBefore(opt, mode.querySelector('option[value="month"]'));
  }
  const monthBox=document.getElementById('monthBox');
  if(monthBox&&!document.getElementById('weekBox')){
    const weekBox=document.createElement('div');
    weekBox.id='weekBox';
    weekBox.className='hidden';
    weekBox.innerHTML='<label>สัปดาห์</label><input id="analyticsWeek" type="week">';
    monthBox.parentNode.insertBefore(weekBox, monthBox);
  }
  const card=document.querySelector('#analytics .card');
  if(card&&!document.getElementById('analyticsTotalSales')){
    const box=document.createElement('div');
    box.id='analyticsTotalSales';
    box.className='summary-box';
    box.style.marginTop='14px';
    box.textContent='0 บาท';
    const label=document.createElement('div');
    label.className='hint';
    label.textContent='ยอดขายรวมตามช่วงเวลาที่เลือก';
    card.appendChild(label);
    card.appendChild(box);
  }
  const w=document.getElementById('analyticsWeek');if(w)w.value=w.value||currentWeekValue();
  const y=document.getElementById('analyticsYear');if(y)y.value=y.value||new Date().getFullYear();
  const m=document.getElementById('analyticsMonth');if(m)m.value=m.value||today().slice(0,7);
}
function toggleAnalyticsPeriod(){
  ensureAnalyticsControls();
  const mode=document.getElementById('analyticsMode')?.value||'month';
  const weekBox=document.getElementById('weekBox');if(weekBox)weekBox.classList.toggle('hidden',mode!=='week');
  const monthBox=document.getElementById('monthBox');if(monthBox)monthBox.classList.toggle('hidden',mode!=='month');
  const yearBox=document.getElementById('yearBox');if(yearBox)yearBox.classList.toggle('hidden',mode!=='year');
}
function parseDateMs(v){
  if(!v)return 0;
  const s=String(v).slice(0,10);
  const d=new Date(s+'T00:00:00');
  return isNaN(d.getTime())?0:d.getTime();
}
function weekRangeFromInput(value){
  const m=String(value||'').match(/^(\d{4})-W(\d{2})$/);
  if(!m)return null;
  const year=Number(m[1]), week=Number(m[2]);
  const jan4=new Date(year,0,4);
  const monday=new Date(jan4);
  monday.setDate(jan4.getDate()-((jan4.getDay()+6)%7)+(week-1)*7);
  monday.setHours(0,0,0,0);
  const next=new Date(monday);next.setDate(monday.getDate()+7);
  return {start:monday.getTime(),end:next.getTime()};
}
function analyticsRows(){
  ensureAnalyticsControls();
  if(state.user?.role!=='owner')return [];
  const mode=document.getElementById('analyticsMode')?.value||'month';
  const month=document.getElementById('analyticsMonth')?.value||today().slice(0,7);
  const year=String(document.getElementById('analyticsYear')?.value||new Date().getFullYear());
  const weekRange=weekRangeFromInput(document.getElementById('analyticsWeek')?.value||currentWeekValue());
  return state.salesOut.filter(s=>{
    const date=String(s.date||'');
    if(mode==='year')return date.startsWith(year);
    if(mode==='week'){
      const ms=parseDateMs(date);
      return !!weekRange&&ms>=weekRange.start&&ms<weekRange.end;
    }
    return date.startsWith(month);
  });
}
function renderBars(elId,data,cls=''){
  const max=Math.max(...data.map(x=>x.value),1);
  document.getElementById(elId).innerHTML=data.map(x=>`<div class="bar-row"><div class="bar-name">${safe(x.name)}</div><div class="bar-track"><div class="bar-fill ${cls}" style="width:${(x.value/max)*100}%"></div></div><div class="bar-value">${money(x.value)}</div></div>`).join('')||'<p class="hint">ไม่มีข้อมูล</p>';
}
function renderAnalytics(){
  if(state.user?.role!=='owner')return;
  ensureAnalyticsControls();
  if(!document.getElementById('customerSalesBars'))return;
  toggleAnalyticsPeriod();
  const rows=analyticsRows();
  const totalSales=rows.reduce((sum,s)=>sum+Number(s.total||0),0);
  const totalBox=document.getElementById('analyticsTotalSales');
  if(totalBox)totalBox.textContent=money(totalSales)+' บาท';
  const byCustomer={},byProduct={};
  rows.forEach(s=>{
    const c=state.customers.find(x=>x.customer_id===s.customer_id);
    const p=state.products.find(x=>x.product_id===s.product_id);
    byCustomer[s.customer_id]=(byCustomer[s.customer_id]||{name:c?.customer_name||s.customer_id,value:0});
    byCustomer[s.customer_id].value+=Number(s.total||0);
    byProduct[s.product_id]=(byProduct[s.product_id]||{name:p?.product_name||s.product_id,value:0});
    byProduct[s.product_id].value+=Number(s.total||0);
  });
  renderBars('customerSalesBars',Object.values(byCustomer).sort((a,b)=>b.value-a.value));
  renderBars('productSalesBars',Object.values(byProduct).sort((a,b)=>b.value-a.value),'product');
}function getGroupedOrder(orderId){return groupOrders().find(o=>String(o.order_id)===String(orderId))}
function buildOrderImageCanvas(orderId){
  const o=getGroupedOrder(orderId);
  if(!o) throw new Error('ไม่พบ order');
  const rowH=32, width=820, headerH=190, footerH=80;
  const height=Math.max(420, headerH + rowH*(o.items.length+1) + footerH);
  const canvas=document.createElement('canvas');canvas.width=width;canvas.height=height;
  const ctx=canvas.getContext('2d');
  ctx.fillStyle='#fff';ctx.fillRect(0,0,width,height);
  ctx.fillStyle='#111827';ctx.font='bold 28px Arial';ctx.textAlign='center';
  ctx.fillText('ใบสั่งซื้อ / Order Summary',width/2,42);
  ctx.font='15px Arial';ctx.fillText('Factory Stock Management System',width/2,68);
  ctx.textAlign='left';ctx.fillStyle='#111827';ctx.font='16px Arial';
  const left=40, right=width-40;
  ctx.fillText('Order: '+o.order_id,left,105);
  ctx.fillText('ร้านค้า: '+(o.customer_name||''),left,130);
  ctx.fillText('วันที่ส่งฟอร์ม: '+(o.timestamp||''),left,155);
  ctx.fillText('วันที่ต้องการจัดส่ง: '+(o.delivery_date||''),left,180);
  ctx.fillText('ชื่อผู้สั่ง: '+(o.ordered_by||''),430,130);
  ctx.fillText('เบอร์โทร: '+(o.phone||''),430,155);
  let y=210;
  ctx.strokeStyle='#111';ctx.beginPath();ctx.moveTo(left,y-18);ctx.lineTo(right,y-18);ctx.stroke();
  ctx.font='bold 16px Arial';
  ctx.fillText('สินค้า',left,y);
  ctx.fillText('จำนวน',430,y);
  ctx.fillText('ราคา',540,y);
  ctx.fillText('รวม',660,y);
  ctx.beginPath();ctx.moveTo(left,y+10);ctx.lineTo(right,y+10);ctx.stroke();
  y+=rowH;
  ctx.font='15px Arial';
  let total=0;
  o.items.forEach(item=>{
    const qty=Number(item.quantity||0), price=Number(item.price||0), amount=Number(item.total||qty*price);
    total+=amount;
    ctx.fillText(String(item.product_name||''),left,y);
    ctx.fillText(String(qty),430,y);
    ctx.fillText(money(price),540,y);
    ctx.fillText(money(amount),660,y);
    y+=rowH;
  });
  ctx.beginPath();ctx.moveTo(left,y-18);ctx.lineTo(right,y-18);ctx.stroke();
  ctx.font='bold 18px Arial';
  ctx.fillText('รวมทั้งสิ้น',540,y+10);
  ctx.fillText(money(total)+' บาท',660,y+10);
  ctx.textAlign='center';ctx.font='bold 18px Arial';ctx.fillText('THANK YOU',width/2,height-30);
  return canvas;
}

function receiptUrl(params={}){
  const base = location.origin + location.pathname.replace(/\/[^\/]*$/, '/') + 'receipt.html';
  const q = new URLSearchParams(params);
  return base + '?' + q.toString();
}
function openReceiptManual(type='manual'){
  const url = receiptUrl({source:type});
  window.open(url, '_blank');
}
function openReceiptForOrder(orderId){
  const url = receiptUrl({source:'order', orderId});
  window.open(url, '_blank');
}

function downloadStockAsImage(){const products=state.products||[];const rowH=34,headerH=92,footerH=42,width=1100,height=Math.max(260,headerH+rowH*(products.length+1)+footerH);const canvas=document.createElement('canvas');canvas.width=width;canvas.height=height;const ctx=canvas.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,width,height);ctx.fillStyle='#111827';ctx.font='bold 28px Arial';ctx.fillText('Factory Stock Real-time',30,42);ctx.font='16px Arial';ctx.fillStyle='#374151';ctx.fillText('Export: '+nowText(),30,70);const cols=[{x:30,t:'รหัส'},{x:150,t:'สินค้า'},{x:480,t:'คงเหลือ'},{x:620,t:'หน่วย'},{x:740,t:'ราคา'},{x:890,t:'มูลค่า'}];let y=headerH;ctx.fillStyle='#e5e7eb';ctx.fillRect(24,y-24,width-48,rowH);ctx.fillStyle='#111827';ctx.font='bold 16px Arial';cols.forEach(col=>ctx.fillText(col.t,col.x,y-2));y+=rowH;ctx.font='15px Arial';let total=0;products.forEach((p,idx)=>{const q=toNonNegativeNumber(state.stock[p.product_id]);const price=toNonNegativeNumber(p.price);const value=q*price;total+=value;if(idx%2===0){ctx.fillStyle='#f9fafb';ctx.fillRect(24,y-24,width-48,rowH)}ctx.fillStyle=q<=0?'#dc2626':'#111827';ctx.fillText(String(p.product_id||''),cols[0].x,y-2);ctx.fillStyle='#111827';ctx.fillText(String(p.product_name||''),cols[1].x,y-2);ctx.fillText(q.toFixed(2),cols[2].x,y-2);ctx.fillText(String(p.unit||''),cols[3].x,y-2);ctx.fillText(money(price),cols[4].x,y-2);ctx.fillText(money(value),cols[5].x,y-2);y+=rowH});ctx.strokeStyle='#d1d5db';ctx.beginPath();ctx.moveTo(24,y-20);ctx.lineTo(width-24,y-20);ctx.stroke();ctx.fillStyle='#111827';ctx.font='bold 18px Arial';ctx.fillText('มูลค่าสต๊อกรวม: '+money(total)+' บาท',30,y+14);const a=document.createElement('a');a.download='stock-realtime-'+today()+'.png';a.href=canvas.toDataURL('image/png');a.click();showCenterSuccess('ดาวน์โหลดรูปภาพแล้ว','Stock real-time PNG')}
