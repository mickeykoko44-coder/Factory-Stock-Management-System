<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Factory Stock Management</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f4f6f9;
}

header{
    background:#1f2937;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:20px;
}

.card{
    background:white;
    border-radius:12px;
    padding:20px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.page{
    display:none;
}

.page.active{
    display:block;
}

input{
    width:100%;
    padding:10px;
    margin-top:8px;
    margin-bottom:16px;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.logout-btn{
    margin-top:20px;
    background:#dc2626;
}

.message{
    margin-top:12px;
    color:red;
    font-weight:bold;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th, td{
    padding:12px;
    border:1px solid #ddd;
}

th{
    background:#e5e7eb;
}
</style>
</head>

<body>

<header>
<h1>Factory Stock Management System</h1>
<p>ระบบจัดการสต๊อกสินค้าโรงงาน</p>
</header>

<div class="container">

<section id="adminLoginPage" class="page active">
  <div class="card" style="max-width:400px;margin:auto;">
    <h2>Admin Login</h2>

    <label>Username</label>
    <input id="adminUser" placeholder="admin">

    <label>Password</label>
    <input id="adminPass" type="password" placeholder="password">

    <button onclick="adminLogin()">Login</button>

    <div id="adminLoginMessage" class="message"></div>
  </div>
</section>

<section id="dashboard" class="page">

<div class="card">
<h2>Dashboard</h2>

<p>เข้าสู่ระบบสำเร็จ</p>

<table>
<thead>
<tr>
<th>สินค้า</th>
<th>จำนวนคงเหลือ</th>
<th>หน่วย</th>
</tr>
</thead>

<tbody>
<tr>
<td>น้ำยาเคมี A</td>
<td>500</td>
<td>ลิตร</td>
</tr>

<tr>
<td>ผงเคมี B</td>
<td>300</td>
<td>kg</td>
</tr>
</tbody>
</table>

<button class="logout-btn" onclick="logoutAdmin()">
Logout
</button>

</div>

</section>

</div>

<script>

const ADMIN_USERNAME = "admin";
const ADMIN_PASSWORD = "admin123";

function adminLogin(){

    const user = document.getElementById("adminUser").value;
    const pass = document.getElementById("adminPass").value;

    if(user === ADMIN_USERNAME && pass === ADMIN_PASSWORD){

        localStorage.setItem("admin_logged_in","true");

        document.getElementById("adminLoginPage")
            .classList.remove("active");

        document.getElementById("dashboard")
            .classList.add("active");

    }else{

        document.getElementById("adminLoginMessage")
            .innerText = "Username หรือ Password ไม่ถูกต้อง";

    }
}

function logoutAdmin(){

    localStorage.removeItem("admin_logged_in");

    location.reload();
}

window.onload = function(){

    const loggedIn =
        localStorage.getItem("admin_logged_in");

    if(loggedIn === "true"){

        document.getElementById("adminLoginPage")
            .classList.remove("active");

        document.getElementById("dashboard")
            .classList.add("active");
    }
}

</script>

</body>
</html>
